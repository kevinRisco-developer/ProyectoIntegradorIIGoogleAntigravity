spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuracion Segura mediante Variables de Entorno
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/db_name}
spring.datasource.username=${DB_USER:usuario}
spring.datasource.password=${DB_PASS:password}
server.port=${SERVER_PORT:8080}
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# Resiliencia del pool HikariCP: el proxy de Railway cierra conexiones ociosas y
# Hibernate/Hikari quedaban entregando conexiones muertas (500 "connection closed").
# Retiramos conexiones antes de ese corte y las validamos/mantenemos vivas.
spring.datasource.hikari.max-lifetime=270000
spring.datasource.hikari.keepalive-time=120000
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.minimum-idle=1

# Configuracion de Email (Gmail)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USER:tu_correo@gmail.com}
spring.mail.password=${MAIL_PASS:tu_password}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Seguridad JWT
jwt.secret=${JWT_SECRET:clave_secreta_para_desarrollo_local}

# Directorio de Backups
backup.directory=${BACKUP_DIR:./backups}
# Ejecutable mysqldump (ruta completa en Windows; en Linux/Railway basta "mysqldump")
backup.mysqldump=${BACKUP_MYSQLDUMP:mysqldump}

# Habilitar tareas programadas (@Scheduled)
spring.task.scheduling.enabled=true
